[workspace]
authors = ["Christopher Bate <cbate@nvidia.com>"]
channels = ["conda-forge"]
name = "llvm-distribution-builder"
platforms = ["linux-64", "linux-aarch64"]
version = "0.1.0"

[tasks]
# Install Python dependencies from MLIR requirements.txt
# This keeps requirements.txt as the single source of truth
# Usage: LLVM_PROJECT_DIR=<path> pixi run install-mlir-deps
# Or from within pixi shell: export LLVM_PROJECT_DIR=<path> && pixi run install-mlir-deps
install-mlir-deps = { cmd = ["bash", "-c", "pip install -r \"${LLVM_PROJECT_DIR:-llvm-project}/mlir/python/requirements.txt\""] }
# Install lit from testpypi (latest development version)
# Usage: pixi run install-lit
install-lit = "pip install --index-url https://test.pypi.org/simple/ --extra-index-url https://pypi.org/simple/ lit"

[dependencies]
clang = ">=21.1.8,<22"
lld = ">=21.1.8,<22"
python = "3.12.*"
ccache = ">=4.12.3,<5"
cmake = ">=4.2.3,<5"
ninja = ">=1.13.2,<2"
clangxx = ">=21.1.8,<22"
pip = "*"
